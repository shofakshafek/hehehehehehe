<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Misi Minta Uang</title>
<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ffd6d6,#fff2cc);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.box{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    text-align:center;
    width:300px;
}
h1{
    color:#ff4d4d;
}
p{
    font-size:18px;
    color:#333;
}
button{
    background:#4CAF50;
    color:white;
    border:none;
    padding:12px 20px;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    margin-top:15px;
}
button:hover{
    background:#45a049;
}
</style>
</head>
<body>

<div class="box">
    <h1>Halo Ayah & Ibu 😇</h1>
    <p>Bolehkah anakmu yang tampan ini minta uang jajan?</p>
    <button onclick="alert('Terima kasih, semoga rezekinya lancar 😎')">
        Kasih Uang 💸
    </button>
</div>

</body>
</html>
