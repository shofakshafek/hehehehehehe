<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Face Recognition Pameran</title>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; background-color: #0d1117; color: #00ffcc; font-family: 'Courier New', Courier, monospace; }
        canvas { position: absolute; }
        video { border: 2px solid #00ffcc; border-radius: 10px; box-shadow: 0 0 20px #00ffcc; }
        .loading { margin-top: 20px; font-size: 1.2em; }
        h2 { text-transform: uppercase; letter-spacing: 3px; }
    </style>
</head>
<body>

    <h2>AI Face Scanner v1.0</h2>
    <div id="status" class="loading">Memuat Otak AI... (Tunggu sebentar)</div>
    
    <div style="position: relative" class="margin">
        <video id="video" width="600" height="450" autoplay muted></video>
    </div>

    <script>
        const video = document.getElementById('video');
        const statusText = document.getElementById('status');

        function startVideo() {
            navigator.mediaDevices.getUserMedia({ video: {} })
                .then(stream => { video.srcObject = stream; })
                .catch(err => console.error("Kamera Error: ", err));
        }

        Promise.all([
            faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/'),
            faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/'),
            faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/'),
            faceapi.nets.ssdMobilenetv1.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/')
        ]).then(setupRecognition);

        async function setupRecognition() {
            statusText.innerText = "Mendaftarkan Wajah...";
            const labeledFaceDescriptors = await loadLabeledImages();
            const faceMatcher = new faceapi.FaceMatcher(labeledFaceDescriptors, 0.6);
            
            statusText.innerText = "Sistem Aktif! Scan Wajah Anda";
            startVideo();

            video.addEventListener('play', () => {
                const canvas = faceapi.createCanvasFromMedia(video);
                document.body.append(canvas);
                const displaySize = { width: video.width, height: video.height };
                faceapi.matchDimensions(canvas, displaySize);

                setInterval(async () => {
                    const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                        .withFaceLandmarks()
                        .withFaceDescriptors();
                    
                    const resizedDetections = faceapi.resizeResults(detections, displaySize);
                    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

                    const results = resizedDetections.map(d => faceMatcher.findBestMatch(d.descriptor));
                    
                    results.forEach((result, i) => {
                        const box = resizedDetections[i].detection.box;
                        const drawBox = new faceapi.draw.DrawBox(box, { label: result.toString() });
                        drawBox.draw(canvas);
                    });
                }, 100);
            });
        }

        async function loadLabeledImages() 
            const labels = ['Budie']; 
            return Promise.all(
                labels.map(async label => {
                    const descriptions = [];
                    const img = await faceapi.fetchImage(`shafiq.jpg`); 
                    const detections = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
                    descriptions.push(detections.descriptor);
                    return new faceapi.LabeledFaceDescriptors(label, descriptions);
                })
            );
        }
    </script>
</body>
</html>
